name: Weekly HMRC Sandbox Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  hmrc-sandbox-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:hmrc-sandbox
        env:
          HMRC_BASE_URL: https://test-api.service.hmrc.gov.uk
